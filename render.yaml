services:
  - type: web
    name: tracker-api
    runtime: python
    pythonVersion: "3.13.1"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --loop asyncio
    envVars:
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: FRED_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: APP_URL
        sync: false
